<!-- blogs.html -->
<div class="blog-page">

  <div class="container">

    <header class="blog-header">
      <span class="badge">Kiến thức & Tin tức</span>
      <h1>SnapVideo <span>Blog</span></h1>
      <p>Nơi chia sẻ mẹo, thủ thuật và cập nhật mới nhất.</p>
    </header>

    <!-- Featured -->
    <article class="featured-post card" *ngIf="posts[0]">
      <div class="featured-grid">

        <div class="img-wrap">
          <img [src]="posts[0].image" [alt]="posts[0].title">
        </div>

        <div class="post-content">
          <span class="category">{{posts[0].category}}</span>

          <h2>
            <a [routerLink]="['/blogs', posts[0].id]">
              {{posts[0].title}}
            </a>
          </h2>

          <p>{{posts[0].excerpt}}</p>

          <div class="meta">
            <span>{{posts[0].date}}</span>

            <a
              [routerLink]="['/blogs', posts[0].id]"
              class="read-more">
              Đọc tiếp →
            </a>
          </div>
        </div>

      </div>
    </article>

    <!-- Grid -->
    <div class="blog-grid">

      <article
        class="card post-item"
        *ngFor="let post of posts.slice(1)">

        <div class="img-wrap">
          <img [src]="post.image" [alt]="post.title">
        </div>

        <div class="post-content">

          <span class="category">{{post.category}}</span>

          <h3>
            <a [routerLink]="['/blogs', post.id]">
              {{post.title}}
            </a>
          </h3>

          <p>{{post.excerpt}}</p>

          <div class="meta">
            <span>{{post.date}}</span>

            <a
              [routerLink]="['/blogs', post.id]"
              class="read-more">
              Xem thêm →
            </a>
          </div>

        </div>

      </article>

    </div>

  </div>
</div>
